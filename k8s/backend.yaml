apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: future-cloud-engineer
spec:
  type: ClusterIP
  ports:
    - port: 8000
  selector:
    app: backend
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: future-cloud-engineer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      initContainers:
      - name: wait-for-postgres
        image: postgres:16-alpine
        # until condition; do
        #   something
        # done
        command: [
          'sh', '-c', 
          'until pg_isready -h postgres -p 5432; do echo waiting for database; sleep 2; done;'
        ]
      containers:
      - name: backend
        image: my-backend:compose
        env:
        - name: ENV
          value: "prod"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: DATABASE_URL
        ports:
        - containerPort: 8000
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /ping
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 20